<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#2D8C4E" />
  <meta name="background-color" content="#0B0F0D" />
  <meta name="description" content="Tekton Fitness — CrossFit. Nutrition. Community. Built Here. Member portal for class scheduling, WOD tracking, PRs, and more." />

  <!-- Apple PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tekton" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />

  <title>Tekton Fitness</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0B0F0D;
      color: #F0F4F1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: #0B0F0D;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.3s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .logo {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #2D8C4E, #1F6B3A);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading .name {
      margin-top: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 4px;
      color: #F0F4F1;
    }
    #loading .tagline {
      margin-top: 6px;
      font-size: 12px; color: #5A6B5E;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Install banner */
    #install-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 10000;
      background: #141A16;
      border-top: 1px solid #2A332C;
      padding: 16px 20px;
      max-width: 430px; margin: 0 auto;
    }
    #install-banner.show { display: flex; align-items: center; gap: 12px; }
    #install-banner .info { flex: 1; }
    #install-banner .info h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px; letter-spacing: 1px; color: #F0F4F1;
    }
    #install-banner .info p { font-size: 12px; color: #5A6B5E; margin-top: 2px; }
    #install-banner .btn-install {
      padding: 10px 20px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #2D8C4E, #1F6B3A);
      color: white; font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; letter-spacing: 2px; cursor: pointer;
    }
    #install-banner .btn-dismiss {
      background: none; border: none; color: #5A6B5E;
      font-size: 20px; cursor: pointer; padding: 4px;
    }

    @supports (padding: env(safe-area-inset-top)) {
      body { padding-top: env(safe-area-inset-top); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="logo">T</div>
    <div class="name">TEKTON</div>
    <div class="tagline">CrossFit. Nutrition. Community.</div>
  </div>

  <!-- React Root -->
  <div id="root"></div>

  <!-- Install Banner -->
  <div id="install-banner">
    <div class="info">
      <h4>Install Tekton Fitness</h4>
      <p>Add to your home screen for the best experience</p>
    </div>
    <button class="btn-install" id="btn-install">Install</button>
    <button class="btn-dismiss" id="btn-dismiss">&times;</button>
  </div>

  <!-- Vite loads your React app -->
  <script type="module" src="/src/main.jsx"></script>

  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('[App] Service worker registered:', reg.scope))
          .catch((err) => console.error('[App] SW registration failed:', err));
      });
    }

    // PWA Install Prompt
    let deferredPrompt = null;
    const banner = document.getElementById('install-banner');
    const btnInstall = document.getElementById('btn-install');
    const btnDismiss = document.getElementById('btn-dismiss');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => banner.classList.add('show'), 3000);
    });

    btnInstall?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[App] Install prompt outcome:', outcome);
      deferredPrompt = null;
      banner.classList.remove('show');
    });

    btnDismiss?.addEventListener('click', () => {
      banner.classList.remove('show');
    });

    window.addEventListener('appinstalled', () => {
      banner.classList.remove('show');
      console.log('[App] PWA installed successfully');
    });

    // Hide Loading Screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading')?.classList.add('hidden');
        setTimeout(() => document.getElementById('loading')?.remove(), 300);
      }, 800);
    });
  </script>

</body>
</html>
